stages:
  - esp_branch_sync
  - upstream_sync
  - test_build
  - test

image: ${CI_DOCKER_REGISTRY}/llvm-build:7

default:
  interruptible: true

variables:
  ESP_LLVM_EMBEDDED_TOOLCHAIN_REF: "esp_dev_on_llvm19"
  ESP_GNU_TOOLCHAIN_VER: "14.2.0_20241119"
  CROSS_ARM_IMAGE: $CI_DOCKER_REGISTRY/llvm-build-cross-arm:2
  CROSS_WIN_IMAGE: $CI_DOCKER_REGISTRY/llvm-build-cross-win:3
  DIST_DIR: "dist"
  BUILD_DIR: "build"
  GITLAB_SERVER_URL: https://gitlab-ci-token:${CI_JOB_TOKEN}@${GITLAB_HTTPS_SERVER}
  REBASE_PUSH_REMOTE: "https://gitlab-ci-token:${ESP_MAINT_TOKEN}@${GITLAB_HTTPS_SERVER}/${CI_PROJECT_PATH}.git"
  ESP_MAIN_SYNCED_TAG: "esp_main_synced"
  ESP_RELEASE_BRANCH: origin/$CI_DEFAULT_BRANCH

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "rebase_on_main"'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "esp_branch_sync"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $SCHED_REBASE_BR'

.use_ci_tools: &use_ci_tools |
  curl -sSL ${CIT_LOADER_URL} -o cit_loader.sh && sh cit_loader.sh
  source citools/import_functions

.add_gitlab_key: &add_gitlab_key |
  cit_add_ssh_key "${GITLAB_KEY}"

.get_toolchain_build_scripts: &get_toolchain_build_scripts |
  git clone -b ${ESP_LLVM_EMBEDDED_TOOLCHAIN_REF} ${GITLAB_SERVER_URL}/${ESP_LLVM_EMBEDDED_TOOLCHAIN_REPO_PATH}.git

.rules:scheduled-rebase-on-main:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "rebase_on_main"'
      variables:
        PUSH_RESULT: "ON"

.rules:scheduled-esp-branch-sync:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "esp_branch_sync"'

.rules:not-scheduled-sync:
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule" || ($SCHEDULE_TYPE != "rebase_on_main" && $SCHEDULE_TYPE != "esp_branch_sync")'

.rules:not-esp-main:
  rules:
    - if: '$CI_COMMIT_BRANCH == $SCHED_REBASE_BR'
      when: never

before_script:
  - *use_ci_tools
  - *add_gitlab_key
  # Set the displayed user with the commits that are about to be made
  - git config --global user.email "${GITLAB_USER_EMAIL}"
  - git config --global user.name "${GITLAB_USER_NAME}"

esp_release_branch_sync:
  stage: esp_branch_sync
  extends:
    - .rules:scheduled-esp-branch-sync
  tags: [ "amd64", "build" ]
  dependencies: []
  variables:
    MR_CREATE_PATH: "/api/v4/projects/${CI_PROJECT_ID}/merge_requests"
    MR_LABELS: "sync_fail"
    CI_TOKEN_HEADER: "PRIVATE-TOKEN: ${ESP_MAINT_TOKEN}"
    CONT_TYPE_HEADER: "Content-Type: application/json"
  script:
    - set -euxo pipefail
    - git remote add push-remote ${REBASE_PUSH_REMOTE}
    - git remote -v
    - BRANCH_NAME=${CI_COMMIT_REF_NAME}
    - git branch -D $BRANCH_NAME || true
    - git checkout -b $BRANCH_NAME
    - ORIG_TAG_HASH=$(git rev-parse $ESP_MAIN_SYNCED_TAG^{commit})
    - echo "Sync tag '$ESP_MAIN_SYNCED_TAG' original hash -> '$ORIG_TAG_HASH'"
    - rc=0
    - llvm/utils/git/cherry-pick-range.py --no-abort -b $ESP_RELEASE_BRANCH $BRANCH_NAME $ESP_MAIN_SYNCED_TAG || rc=$?
    - echo "rc=$rc"
    - |
      # if neither commits were picked, create WIP branch and MR to resolve conflict and merge
      if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
        WIP_BRANCH=$(cat .esp_rebase_WIP_BRANCH)
        if [ -z "$WIP_BRANCH" ]; then
          echo "WIP branch not found"
          exit 1
        fi
        echo "Push conflict resolution WIP branch '$WIP_BRANCH' to '$REBASE_PUSH_REMOTE'"
        git push push-remote $WIP_BRANCH
        git status
        CONFLICT_HASH=$(cat .esp_rebase_HEAD)
        MR_DESC="MR created by $CI_JOB_URL to fix \`$ESP_RELEASE_BRANCH\` -> \`$BRANCH_NAME\` sync conflict."
        MR_DESC="${MR_DESC}\n\nTODO:"
        MR_DESC="${MR_DESC}\n- [ ] Look for \`<<<<<<<\` and \`>>>>>>>\` markers in the files and solve conflicts."
        MR_DESC="${MR_DESC}\n- [ ] Ensure pipeline passes."
        MR_DESC="${MR_DESC}\n- [ ] DISABLE ALL SCHEDULED SYNC PIPELINES for \`$BRANCH_NAME\`!"
        MR_DESC="${MR_DESC}\n- [ ] Rebase if necessary and merge this MR."
        MR_DESC="${MR_DESC}\n- [ ] Move \`$ESP_MAIN_SYNCED_TAG\` tag to $CONFLICT_HASH."
        MR_DESC="${MR_DESC}\n- [ ] RE-ENABLE ALL SCHEDULED SYNC PIPELINES for \`$BRANCH_NAME\`!"
        MR_BODY='{
          "id": '"$CI_PROJECT_ID"',
          "source_branch": "'"${WIP_BRANCH}"'",
          "target_branch": "'"${BRANCH_NAME}"'",
          "title": "Draft: '"${WIP_BRANCH}"'",
          "description": "'"${MR_DESC}"'",
          "assignee_id": '"${GITLAB_USER_ID}"',
          "labels": "'"${MR_LABELS}"'",
          "remove_source_branch": true
        }'
        curl -X POST "${CI_SERVER_URL}${MR_CREATE_PATH}" --header "$CI_TOKEN_HEADER" --header "$CONT_TYPE_HEADER" --data "${MR_BODY}"
        exit 1
      fi
    # Push synced branch with updated tag atomically
    # if one cherry-pick failed, but some commits were picked (rc is 2), WIP branch will be created on the next run of this job.
    - echo "Push updated branch '$BRANCH_NAME' and sync tag '$ESP_MAIN_SYNCED_TAG' to '$REBASE_PUSH_REMOTE'"
    - git push --force --atomic push-remote $BRANCH_NAME $ESP_MAIN_SYNCED_TAG
    - git status

rebase_on_main:
  stage: upstream_sync
  extends:
    - .rules:scheduled-rebase-on-main
  tags: [ "amd64", "build" ]
  variables:
    PUSH_RESULT: "OFF"
  script:
    - set -euxo pipefail
    - GIT_DIR=$( git rev-parse --git-dir )
    - git fetch origin $SCHED_REBASE_ONTO_BR
    - git remote add push-remote ${REBASE_PUSH_REMOTE}
    - git remote -v
    - BRANCH_NAME=${CI_COMMIT_REF_NAME}
    - git branch -D $BRANCH_NAME || true
    - git checkout -b $BRANCH_NAME
    - | 
      rc=0
      echo "Rebase branch '$BRANCH_NAME' on 'origin/$SCHED_REBASE_ONTO_BR'"
      if git rebase origin/$SCHED_REBASE_ONTO_BR ; then
        echo "Successfully rebased branch '$BRANCH_NAME'"
        if [[ "${PUSH_RESULT}" == "ON" ]]; then
          # --force-with-lease doesn't work on shallow clones
          echo "Push rebased branch '$BRANCH_NAME' to '$REBASE_PUSH_REMOTE'"
          git push push-remote $BRANCH_NAME --force
        else
          echo "Skip pushing rebased branch '$BRANCH_NAME'"
        fi
      else
        rc=$?
        echo "Rebasing branch '$BRANCH_NAME' on 'origin/$SCHED_REBASE_ONTO_BR' failed!"
        echo “Please rebase '$BRANCH_NAME' onto 'origin/$SCHED_REBASE_ONTO_BR' branch manually.”
        if [ -d "${GIT_DIR}/rebase-merge" ] || [ -d "${GIT_DIR}/rebase-apply" ] ; then
            echo "Abort rebase"
            git rebase --abort
        fi
      fi
      git status
      exit $rc

# some Clang/LLVM unit tests fail if we build Clang for RISCV+Xtensa only
# this job is intended to run unit tests only, so it builds Clang with X86, RISCV and Xtensa backends
# TODO: LLVM-326 and LLVM-401
build_and_test:
  tags: [ "amd64", "build" ]
  stage: test_build
  extends:
    - .rules:not-scheduled-sync
  artifacts:
    paths:
      - ${DIST_DIR}/
      - ${BUILD_DIR}/*.log
    when: always
    expire_in: 1 day
  retry: 1
  variables:
    PACK_TOOL: "tar cJhvf"
  before_script:
    - git config --global --add safe.directory $CI_PROJECT_DIR
  after_script:
    # help to identify that build failed due to OOM
    - >
      if [ $CI_JOB_STATUS == 'failed' ]; then
        [ ! -f "${BUILD_DIR}/build.log" ] || grep -i "internal compiler error\|Killed" ${BUILD_DIR}/build.log || true
        [ ! -f "${BUILD_DIR}/tests.log" ] || grep -i "internal compiler error\|Killed" ${BUILD_DIR}/tests.log || true
        [ ! -f "${BUILD_DIR}/lld-tests.log" ] || grep -i "internal compiler error\|Killed" ${BUILD_DIR}/lld-tests.log || true
      fi
  script:
    - BUILD_PATH=$PWD/${BUILD_DIR}
    - LLVM_PROJECT_PATH=$PWD
    - mkdir -p ${BUILD_PATH}
    - cmake -G Ninja
      -S llvm
      -DLLVM_ENABLE_PROJECTS="clang;lld;clang-tools-extra"
      -DCMAKE_BUILD_TYPE=Release
      -DLLVM_ENABLE_ASSERTIONS=ON
      -DLLVM_APPEND_VC_REV=OFF
      -DLLDB_INCLUDE_TESTS=OFF
      -DLLVM_TARGETS_TO_BUILD="X86;RISCV"
      -DLLVM_EXPERIMENTAL_TARGETS_TO_BUILD=Xtensa
      -DLLVM_USE_LINKER="gold"
      -DLLVM_PARALLEL_LINK_JOBS=${ESP_LLVM_PARALLEL_LINK_JOBS}
      -DLLVM_FORCE_VC_REPOSITORY="${GH_REPO_HTTPS}"
      -B ${BUILD_PATH} 2>&1 > ${BUILD_PATH}/build.log
    - export CUR_USER=$(whoami);
    - useradd -m test_runner;
    - chown -R test_runner ${BUILD_PATH};
    - runuser -u test_runner -- git config --global --add safe.directory $CI_PROJECT_DIR
    - echo "Run LLVM/Clang unit tests";
    - touch ${BUILD_PATH}/tests.log;
    - chmod o+w ${BUILD_PATH}/tests.log;
    - runuser -u test_runner -- ninja -C ${BUILD_PATH} check-all 2>&1 | tee ${BUILD_PATH}/tests.log;
    - echo "Run LLD unit tests";
    - touch ${BUILD_PATH}/lld-tests.log;
    - chmod o+w ${BUILD_PATH}/lld-tests.log;
    - runuser -u test_runner -- ninja -C ${BUILD_PATH} check-lld 2>&1 | tee ${BUILD_PATH}/lld-tests.log;
    - chown -R ${CUR_USER} ${BUILD_PATH};
    - mkdir -p ${PWD}/${DIST_DIR}
    - PIE_TEST_TOOLS_ARCH=${PWD}/${DIST_DIR}/pie_test_tools.tar.xz
    - pushd ${BUILD_PATH}
    - echo "Packing tools for PIE optimization tests"
    - ${PACK_TOOL} ${PIE_TEST_TOOLS_ARCH} bin/clang bin/llc bin/llvm-objdump bin/opt lib/clang
    - popd
    - ls -l ${PWD}/${DIST_DIR}

test_pie_optimizations:
  tags: [ "amd64", "build" ]
  stage: test
  extends:
    - .rules:not-scheduled-sync
  needs:
    - job: "build_and_test"
  artifacts:
    paths:
      - esp-dsp/scripts/
    when: always
    expire_in: 1 day
  variables:
    TEST_APP_ESP_DSP_CUSTOM_BRANCH: "llvm-23-optimization-test-v3"
    UNPACK_TOOL: "tar xJvf"
  allow_failure: true
  script:
    - LLVM_PROJECT_PATH=$PWD
    - ls -l ${PWD}/${DIST_DIR}
    - PIE_TEST_TOOLS_ARCH=${PWD}/${DIST_DIR}/pie_test_tools.tar.xz
    - echo "Unpacking tools for PIE optimization tests"
    - mkdir pie_tests
    - pushd pie_tests
    - ${UNPACK_TOOL} ${PIE_TEST_TOOLS_ARCH}
    - ls -l $PWD
    - export PATH=${PWD}/bin:${PATH}
    - popd
    - git clone --shallow-submodules --recursive --single-branch --branch $TEST_APP_ESP_DSP_CUSTOM_BRANCH -- ${GITLAB_SERVER_URL}/idf/esp-dsp.git esp-dsp
    - pushd $PWD/esp-dsp/
    - echo ${LLVM_PROJECT_PATH}/llvm/utils/update_test_checks.py
    - ./test_all.sh ${LLVM_PROJECT_PATH}/llvm/utils/update_test_checks.py
